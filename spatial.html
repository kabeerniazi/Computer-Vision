<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Computer Vision: Spatial Filtering</title>
    <link rel="stylesheet" href="style.css"> </head>
<body>
<nav style="background-color: #1a252f; padding: 10px 20px; display: flex; justify-content: center; flex-wrap: wrap; gap: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.3);">
  
    <a href="index.html" style="color: white; text-decoration: none; font-size: 14px; font-weight: bold; padding: 8px 12px;">1. Point Processing</a>
    <a href="spatial.html" style="color: white; text-decoration: none; font-size: 14px; font-weight: bold; padding: 8px 12px;">2. Spatial Filtering</a>
    <a href="morphology.html" style="color: white; text-decoration: none; font-size: 14px; font-weight: bold; padding: 8px 12px;">3. Morphology</a>
    <a href="segmentation.html" style="color: white; text-decoration: none; font-size: 14px; font-weight: bold; padding: 8px 12px;">4. Segmentation</a>
  
</nav>


    <header>
        <h1>Interactive Image Processing</h1>
        <p>Module A: Spatial Filtering & Edge Detection (Convolution)</p>
    </header>

    <div class="toolbar">
        <div class="control-group">
            <label for="imageUpload">1. Upload Image:</label>
            <input type="file" id="imageUpload" accept="image/*">
        </div>

        <div class="control-group">
            <label for="filterSelect">2. Select 3x3 Kernel:</label>
            <select id="filterSelect">
                <option value="original">Original</option>
                <option value="mean">Mean Blur (Smoothing)</option>
                <option value="gaussian">Gaussian Blur</option>
                <option value="laplacian">Laplacian (Edge Detection)</option>
                <option value="sobelX">Sobel X (Vertical Edges)</option>
                <option value="sobelY">Sobel Y (Horizontal Edges)</option>
            </select>
        </div>

        <div id="matrixDisplay" class="control-group">
            <label>Active Kernel Matrix:</label>
            <div id="kernelGrid" class="formula" style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; text-align: center;">
                </div>
        </div>
    </div>

    <div class="workspace">
        <div class="canvas-container">
            <h3>Original Image</h3>
            <canvas id="canvasOriginal"></canvas>
        </div>
        <div class="canvas-container">
            <h3>Convolved Image</h3>
            <canvas id="canvasProcessed"></canvas>
        </div>
    </div>

    <script src="spatial.js"></script>
</body>
</html>

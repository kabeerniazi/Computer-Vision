<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Computer Vision: Image Segmentation</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<nav style="background-color: #1a252f; padding: 10px 20px; display: flex; justify-content: center; flex-wrap: wrap; gap: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.3);">
   
    <a href="index.html" style="color: white; text-decoration: none; font-size: 14px; font-weight: bold; padding: 8px 12px;">1. Point Processing</a>
    <a href="spatial.html" style="color: white; text-decoration: none; font-size: 14px; font-weight: bold; padding: 8px 12px;">2. Spatial Filtering</a>
    <a href="morphology.html" style="color: white; text-decoration: none; font-size: 14px; font-weight: bold; padding: 8px 12px;">3. Morphology</a>
    <a href="segmentation.html" style="color: white; text-decoration: none; font-size: 14px; font-weight: bold; padding: 8px 12px;">4. Segmentation</a>
   
</nav>


    <header>
        <h1>Interactive Image Processing</h1>
        <p>Module A: Image Segmentation (Region Growing & K-Means)</p>
    </header>

    <div class="toolbar">
        <div class="control-group">
            <label for="imageUpload">1. Upload Image:</label>
            <input type="file" id="imageUpload" accept="image/*">
        </div>

        <div class="control-group">
            <label for="segmentSelect">2. Select Algorithm:</label>
            <select id="segmentSelect">
                <option value="original">Original</option>
                <option value="region">Region Growing (Click Image!)</option>
                <option value="kmeans">K-Means Clustering</option>
            </select>
        </div>

        <div id="paramRegion" class="control-group" style="display: none;">
            <label for="toleranceSlider">Tolerance (T): <span id="tolValue">30</span></label>
            <input type="range" id="toleranceSlider" min="5" max="100" step="1" value="30">
            <div class="formula">Click on the Original Image to plant a seed!</div>
        </div>

        <div id="paramKMeans" class="control-group" style="display: none;">
            <label for="kSlider">Clusters (K): <span id="kValue">3</span></label>
            <input type="range" id="kSlider" min="2" max="10" step="1" value="3">
            <button id="runKMeans" style="margin-top: 5px; cursor: pointer;">Run K-Means</button>
        </div>
    </div>

    <div class="workspace">
        <div class="canvas-container">
            <h3>Original Image</h3>
            <canvas id="canvasOriginal" style="cursor: crosshair;"></canvas>
        </div>
        <div class="canvas-container">
            <h3>Segmented Image</h3>
            <canvas id="canvasProcessed"></canvas>
        </div>
    </div>

    <script src="segmentation.js"></script>
</body>
</html>
